<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Frutiger Aero Break Screen</title>

<style>

body{
margin:0;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:
linear-gradient(to bottom,
#b8ffff,
#78e4ff,
#3bc7ff);

font-family:Arial;
}

.orb{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
animation:float 6s ease-in-out infinite;
}

.orb1{
width:220px;
height:220px;
top:10%;
left:10%;
}

.orb2{
width:140px;
height:140px;
bottom:15%;
right:15%;
animation-delay:2s;
}

.characters{
display:flex;
gap:120px;
z-index:2;
}

.character{
width:150px;
height:150px;
border-radius:50%;

background:
rgba(255,255,255,0.25);

border:3px solid rgba(255,255,255,0.5);

backdrop-filter:blur(15px);

box-shadow:
0 0 40px rgba(255,255,255,0.8),
inset 0 0 20px rgba(255,255,255,0.6);

position:relative;

animation:bob 3s ease-in-out infinite;
}

.character2{
animation-delay:1.5s;
}

.eye{
width:15px;
height:15px;
background:white;
border-radius:50%;
position:absolute;
top:60px;
}

.eye.left{
left:45px;
}

.eye.right{
right:45px;
}

h1{
color:white;
font-size:60px;
text-shadow:0 0 20px white;
margin-top:50px;
}

@keyframes bob{
0%{transform:translateY(0px);}
50%{transform:translateY(-25px);}
100%{transform:translateY(0px);}
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-40px);}
100%{transform:translateY(0px);}
}

</style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="characters">

<div class="character">
<div class="eye left"></div>
<div class="eye right"></div>
</div>

<div class="character character2">
<div class="eye left"></div>
<div class="eye right"></div>
</div>

</div>

<h1>BREAK TIME</h1>

</body>
</html>
